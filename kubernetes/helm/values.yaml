minecraftServer:
  eula: true
  version: "LATEST"
  motd: "My Git-managed Minecraft server"
  type: "PAPER"
  maxPlayers: 5
  difficulty: "normal"

persistence:
  dataDir:
    enabled: true
    size: 10Gi

resources:
  requests:
    memory: "2Gi"
    cpu: "1"
  limits:
    memory: "3Gi"
    cpu: "2"

service:
  type: LoadBalancer
  port: 25565
